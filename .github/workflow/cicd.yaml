name: CI/CD Deploy to AWS EC2 with Docker Hub

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: fedebi1/chatbot-agent-1
  CONTAINER_NAME: chatbot-agent-1
  CONTAINER_PORT: 8501
  HOST_PORT: 8501

jobs:
  deploy:
    name: Build and deploy
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check Docker secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "DOCKER_USERNAME is missing"
            exit 1
          fi

          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "DOCKER_PASSWORD is missing"
            exit 1
          fi

          echo "Docker secrets exist"
    
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t $DOCKER_IMAGE:${{ github.sha }} .
          docker tag $DOCKER_IMAGE:${{ github.sha }} $DOCKER_IMAGE:latest
          docker push $DOCKER_IMAGE:${{ github.sha }}
          docker push $DOCKER_IMAGE:latest

      - name: Deploy container on EC2
        run: |
          docker pull $DOCKER_IMAGE:latest

          docker stop $CONTAINER_NAME || true
          docker rm $CONTAINER_NAME || true

          docker run -d \
            --name $CONTAINER_NAME \
            --restart unless-stopped \
            -p $HOST_PORT:$CONTAINER_PORT \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            -e TAVILY_API_KEY="${{ secrets.TAVILY_API_KEY }}" \
            -e LANGSMITH_TRACING="${{ secrets.LANGSMITH_TRACING }}" \
            -e LANGSMITH_ENDPOINT="${{ secrets.LANGSMITH_ENDPOINT }}" \
            -e LANGSMITH_API_KEY="${{ secrets.LANGSMITH_API_KEY }}" \
            -e LANGSMITH_PROJECT="${{ secrets.LANGSMITH_PROJECT }}" \
            -e GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
            -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            $DOCKER_IMAGE:latest