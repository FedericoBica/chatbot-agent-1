name: CI/CD Deploy to AWS EC2

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: chatbot-agent-1
  CONTAINER_NAME: chatbot-agent-1
  CONTAINER_PORT: 8501
  HOST_PORT: 8501

jobs:
  deploy:
    name: Build and deploy
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image locally
        run: |
          docker build -t $DOCKER_IMAGE:latest .

      - name: Stop old container
        run: |
          docker stop $CONTAINER_NAME || true
          docker rm $CONTAINER_NAME || true

      - name: Run new container
        run: |
          docker run -d \
            --name $CONTAINER_NAME \
            --restart unless-stopped \
            -p $HOST_PORT:$CONTAINER_PORT \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            -e TAVILY_API_KEY="${{ secrets.TAVILY_API_KEY }}" \
            -e LANGSMITH_TRACING="${{ secrets.LANGSMITH_TRACING }}" \
            -e LANGSMITH_ENDPOINT="${{ secrets.LANGSMITH_ENDPOINT }}" \
            -e LANGSMITH_API_KEY="${{ secrets.LANGSMITH_API_KEY }}" \
            -e LANGSMITH_PROJECT="${{ secrets.LANGSMITH_PROJECT }}" \
            -e GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
            -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            $DOCKER_IMAGE:latest